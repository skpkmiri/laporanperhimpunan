<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Perhimpunan SKPK Miri</title>
    
    <!-- Memuatkan Tailwind CSS untuk gaya dan rekaan -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      /* Tetapan khas untuk paparan cetakan (Print) */
      @media print {
        @page {
          /* Membuang url/tarikh default browser di bahagian atas dan bawah kertas */
          margin: 0; 
        }
        body {
          /* Menetapkan ruang margin putih yang sesuai untuk format A4 */
          margin: 1.5cm; 
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-slate-100">
    <!-- Ini adalah 'bekas' di mana fail App.jsx akan dimuatkan -->
    <div id="root"></div>
    
    <!-- Sambungan kepada fail utama React (biasanya main.jsx atau index.jsx) -->
    <!-- Jika anda menggunakan Create React App, baris ini mungkin tidak diperlukan -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
